name: 'Build and Push Frontend Image to ECR'

# Pipeline triggers under these conditions
on:
  push:
    branches:
      - main
    paths:
      - 'src_frontend/**' # Triggers only when changes are pushed to the src_frontend folder

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: sree84s-prod-image # Your ECR repository name
  IMAGE_TAG: latest
  
# Note: AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY must be set in GitHub Secrets.

jobs:
  build-and-push:
    name: 'Build & Push Docker Image'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (IAM User Keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          # Retrieves credentials from GitHub Secrets
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # output-env-credentials: true # Not required for this use case

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push the Image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_URI: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
        run: |
          echo "Building and Pushing Image: $IMAGE_URI"
          
          # Adjust docker build command based on your project structure
          # Dockerfile path: src_frontend/Dockerfile
          # Build context: src_frontend/
          docker build -t $IMAGE_URI -f src_frontend/Dockerfile src_frontend/ --push

      - name: Verification
        run: |
          echo "Successfully pushed Image: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} to ECR."
          echo "Your manual deployment steps can now proceed."

      # --- Removed Steps ---
      # Terraform Init and Apply steps have been removed as requested for manual deployment.